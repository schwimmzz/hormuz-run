<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;position:fixed;top:0;left:0}
canvas{display:block;cursor:crosshair;image-rendering:auto;position:fixed;top:0;left:0}

/* ---- Fullscreen Gate Overlay ---- */
#fs-gate {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:radial-gradient(circle at 50% 38%, #0a1a10 0%, #050d08 45%, #020504 100%);
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    z-index:1000;
    font-family:'Courier New','Consolas',monospace;
    touch-action:manipulation;
    overflow:hidden;
}
#fs-gate.hidden { display:none; }

/* Sonar animation */
#fs-sonar {
    position:absolute;
    top:43%; left:50%;
    transform:translate(-50%,-50%);
    width:min(75vw, 40vh);
    height:min(75vw, 40vh);
    pointer-events:none;
}
.sonar-ring {
    position:absolute; top:50%; left:50%;
    border-radius:50%;
    border:1px solid rgba(51,255,136,0.07);
    transform:translate(-50%,-50%);
}
.sonar-ring.r1 { width:25%; height:25%; }
.sonar-ring.r2 { width:50%; height:50%; }
.sonar-ring.r3 { width:75%; height:75%; }
.sonar-ring.r4 { width:100%; height:100%; }
.sonar-sweep {
    position:absolute; top:50%; left:50%;
    width:50%; height:2px;
    transform-origin:0% 50%;
    animation:sweep 4s linear infinite;
    background:linear-gradient(90deg, rgba(51,255,136,0.4) 0%, rgba(51,255,136,0) 100%);
}
.sonar-sweep::after {
    content:'';
    position:absolute; top:50%; left:0;
    width:100%; height:100%;
    transform-origin:0% 50%;
    transform:rotate(-15deg);
    background:linear-gradient(90deg, rgba(51,255,136,0.08) 0%, transparent 100%);
    filter:blur(6px);
    height:60px; top:-30px;
}
@keyframes sweep { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
.sonar-ping {
    position:absolute;
    width:6px; height:6px;
    border-radius:50%;
    background:rgba(51,255,136,0.3);
    animation:ping-fade 4s ease-out infinite;
}
@keyframes ping-fade {
    0%,80%{opacity:0} 85%{opacity:0.6} 100%{opacity:0}
}
/* Pulse ring that expands outward */
.sonar-pulse {
    position:absolute; top:50%; left:50%;
    width:10%; height:10%;
    border-radius:50%;
    border:1px solid rgba(51,255,136,0.2);
    transform:translate(-50%,-50%);
    animation:sonar-expand 4s ease-out infinite;
}
.sonar-pulse.p2 { animation-delay:2s; }
@keyframes sonar-expand {
    0%{width:5%;height:5%;opacity:0.4;border-color:rgba(51,255,136,0.3)}
    100%{width:110%;height:110%;opacity:0;border-color:rgba(51,255,136,0)}
}

/* Portrait: rotate message (unused but kept) */
#fs-rotate { display:none; flex-direction:column; align-items:center; gap:16px; }

/* Prompt */
#fs-prompt {
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    z-index:2;
    text-align:center;
    padding:0 20px;
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    box-sizing:border-box;
    padding:max(40px,8vh) 20px max(30px,5vh);
}
#fs-prompt .title {
    color:#33ff88;
    font-size:clamp(40px, 10vw, 64px);
    font-weight:bold;
    letter-spacing:clamp(6px, 2vw, 14px);
    text-shadow: 0 0 30px rgba(51,255,136,0.5), 0 0 60px rgba(51,255,136,0.2);
    line-height:1.1;
}
#fs-prompt .sub {
    color:#557755;
    font-size:clamp(10px, 2.5vw, 14px);
    letter-spacing:3px;
    margin-top:8px;
}
#fs-prompt .middle {
    position:absolute;
    top:calc(43% + min(37.5vw, 20vh) + 10px);
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}
#fs-prompt .bottom {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}
#fs-btn {
    background:none;
    border:2px solid #33ff88;
    color:#33ff88;
    font-family:'Courier New','Consolas',monospace;
    font-size:clamp(16px, 4vw, 22px);
    font-weight:bold;
    letter-spacing:4px;
    padding:clamp(14px,3vw,22px) clamp(48px,12vw,80px);
    white-space:nowrap;
    cursor:pointer;
    text-transform:uppercase;
    transition: all 0.2s;
    animation: pulse-border 2s infinite;
    margin-top:8px;
}
#fs-btn:active {
    background:#33ff88;
    color:#000;
}
@keyframes pulse-border {
    0%,100% { box-shadow: 0 0 8px rgba(51,255,136,0.3); }
    50% { box-shadow: 0 0 25px rgba(51,255,136,0.6), 0 0 50px rgba(51,255,136,0.15); }
}
#fs-prompt .hint {
    color:#336644;
    font-size:clamp(10px,2.5vw,13px);
    letter-spacing:1px;
    margin-top:4px;
}
</style>

<canvas id="c"></canvas>
<script>
'use strict';
// ============================================================
//  HORMUZ RUN  —  Navigate. Survive. Profit.
// ============================================================

// ============================================================
//  SOUND ENGINE (Web Audio API + HTML5 Audio for music)
// ============================================================

const SFX = {
    ctx: null,
    musicEl: document.getElementById('bg-music'),
    musicVol: 0.35,
    masterVol: 0.6,
    muted: false,
    _wantMusic: false,

    _musicBuffer: null,
    _bufSrc: null,
    _musicRaw: null,
    _musicDecoding: false,

    prefetchMusic() {
        const url = this.musicEl ? this.musicEl.getAttribute('src') : 'theme.mp3';
        fetch(url).then(r => r.arrayBuffer()).then(buf => {
            this._musicRaw = buf;
            if (this.ctx && !this._musicBuffer) this._decodeMusicData();
        }).catch(() => {});
    },

    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.gain.value = this.masterVol;
        this.master.connect(this.ctx.destination);

        // Music gain node
        this.musicGain = this.ctx.createGain();
        this.musicGain.gain.value = this.musicVol;
        this.musicGain.connect(this.ctx.destination);

        // Decode pre-fetched music data if available
        if (this._musicRaw && !this._musicBuffer) this._decodeMusicData();
    },

    _decodeMusicData() {
        if (this._musicDecoding || this._musicBuffer || !this._musicRaw || !this.ctx) return;
        this._musicDecoding = true;
        // Callback form of decodeAudioData for maximum mobile compatibility
        this.ctx.decodeAudioData(this._musicRaw.slice(0),
            (decoded) => {
                this._musicBuffer = decoded;
                this._musicDecoding = false;
                if (this._wantMusic && !this._bufSrc) this._startBuffer();
            },
            () => { this._musicDecoding = false; }
        );
    },

    _startBuffer() {
        if (!this._musicBuffer || !this.ctx) return;
        if (this._bufSrc) { try { this._bufSrc.stop(); } catch(e) {} this._bufSrc = null; }
        const src = this.ctx.createBufferSource();
        src.buffer = this._musicBuffer;
        src.loop = true;
        src.connect(this.musicGain);
        src.start(0);
        this._bufSrc = src;
    },

    resume() {
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    },

    // ---- Music controls ----
    playMusic() {
        this._wantMusic = true;
        if (this.musicGain && this.ctx) {
            this.musicGain.gain.cancelScheduledValues(this.ctx.currentTime);
            this.musicGain.gain.value = this.musicVol;
        }
        if (!this._bufSrc) {
            if (this._musicBuffer) this._startBuffer();
            else if (!this._musicDecoding) this._decodeMusicData();
        }
    },
    stopMusic() {
        this._wantMusic = false;
        if (this._bufSrc) { try { this._bufSrc.stop(); } catch(e) {} this._bufSrc = null; }
        if (this.musicGain) this.musicGain.gain.value = this.musicVol;
    },
    fadeMusic(vol, dur) {
        if (!this.musicGain || !this.ctx) return;
        const now = this.ctx.currentTime;
        this.musicGain.gain.cancelScheduledValues(now);
        this.musicGain.gain.setValueAtTime(this.musicGain.gain.value, now);
        this.musicGain.gain.linearRampToValueAtTime(vol, now + dur / 1000);
    },

    // ---- Utility: create noise buffer ----
    _noiseBuf: null,
    noise(duration) {
        if (!this._noiseBuf) {
            const sr = this.ctx.sampleRate;
            this._noiseBuf = this.ctx.createBuffer(1, sr*2, sr);
            const d = this._noiseBuf.getChannelData(0);
            for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
        }
        const src = this.ctx.createBufferSource();
        src.buffer = this._noiseBuf;
        return src;
    },

    // ---- Utility: waveshaper for distortion ----
    _distCurve: null,
    distortion(amount) {
        const ws = this.ctx.createWaveShaper();
        if (!this._distCurve) {
            const n = 256, curve = new Float32Array(n);
            for (let i = 0; i < n; i++) {
                const x = (i * 2) / n - 1;
                curve[i] = (Math.PI + amount) * x / (Math.PI + amount * Math.abs(x));
            }
            this._distCurve = curve;
        }
        ws.curve = this._distCurve;
        ws.oversample = '2x';
        return ws;
    },

    // ---- SFX generators ----
    ping() { // sonar ping — atmospheric with echo tail
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        // Primary ping
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1400, t);
        osc.frequency.exponentialRampToValueAtTime(880, t + 0.12);
        g.gain.setValueAtTime(0.18, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        osc.connect(g); g.connect(this.master);
        osc.start(t); osc.stop(t + 0.6);
        // Harmonic overtone
        const osc2 = this.ctx.createOscillator();
        const g2 = this.ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(2800, t);
        osc2.frequency.exponentialRampToValueAtTime(1760, t + 0.1);
        g2.gain.setValueAtTime(0.04, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc2.connect(g2); g2.connect(this.master);
        osc2.start(t); osc2.stop(t + 0.3);
        // Echo reflection
        const osc3 = this.ctx.createOscillator();
        const g3 = this.ctx.createGain();
        osc3.type = 'sine';
        osc3.frequency.setValueAtTime(1300, t + 0.2);
        osc3.frequency.exponentialRampToValueAtTime(860, t + 0.3);
        g3.gain.setValueAtTime(0.001, t);
        g3.gain.setValueAtTime(0.06, t + 0.2);
        g3.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        osc3.connect(g3); g3.connect(this.master);
        osc3.start(t); osc3.stop(t + 0.8);
    },

    blip() { // UI navigation — soft click with pitch sweep
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(500, t);
        osc.frequency.exponentialRampToValueAtTime(800, t + 0.03);
        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        osc.connect(g); g.connect(this.master);
        osc.start(t); osc.stop(t + 0.08);
        // Subtle body
        const osc2 = this.ctx.createOscillator();
        const g2 = this.ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = 1200;
        g2.gain.setValueAtTime(0.03, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        osc2.connect(g2); g2.connect(this.master);
        osc2.start(t); osc2.stop(t + 0.04);
    },

    explosion() { // mine hit — heavy layered blast
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        // Layer 1: initial crack (sharp bandpass noise burst)
        const n1 = this.noise(0.15);
        const bp = this.ctx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 2500; bp.Q.value = 0.8;
        const g1 = this.ctx.createGain();
        g1.gain.setValueAtTime(0.6, t);
        g1.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        n1.connect(bp); bp.connect(g1); g1.connect(this.master);
        n1.start(t); n1.stop(t + 0.15);
        // Layer 2: body rumble (lowpass noise, long tail)
        const n2 = this.noise(1.0);
        const lp = this.ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.setValueAtTime(600, t);
        lp.frequency.exponentialRampToValueAtTime(60, t + 0.8);
        const dist = this.distortion(8);
        const g2 = this.ctx.createGain();
        g2.gain.setValueAtTime(0.5, t);
        g2.gain.setValueAtTime(0.45, t + 0.05);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
        n2.connect(lp); lp.connect(dist); dist.connect(g2); g2.connect(this.master);
        n2.start(t); n2.stop(t + 1.0);
        // Layer 3: sub-bass thump (you feel this one)
        const sub = this.ctx.createOscillator();
        const g3 = this.ctx.createGain();
        sub.type = 'sine';
        sub.frequency.setValueAtTime(70, t);
        sub.frequency.exponentialRampToValueAtTime(18, t + 0.4);
        g3.gain.setValueAtTime(0.55, t);
        g3.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        sub.connect(g3); g3.connect(this.master);
        sub.start(t); sub.stop(t + 0.5);
        // Layer 4: mid-range crunch
        const n3 = this.noise(0.4);
        const mid = this.ctx.createBiquadFilter();
        mid.type = 'bandpass'; mid.frequency.value = 800; mid.Q.value = 1.2;
        const g4 = this.ctx.createGain();
        g4.gain.setValueAtTime(0.3, t + 0.02);
        g4.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        n3.connect(mid); mid.connect(g4); g4.connect(this.master);
        n3.start(t); n3.stop(t + 0.4);
    },

    droneHit() { // drone impact — metallic crack + body thump
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        // Metallic transient (high-freq ring)
        const osc = this.ctx.createOscillator();
        const g1 = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(3200, t);
        osc.frequency.exponentialRampToValueAtTime(1600, t + 0.03);
        g1.gain.setValueAtTime(0.2, t);
        g1.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        osc.connect(g1); g1.connect(this.master);
        osc.start(t); osc.stop(t + 0.06);
        // Impact body
        const n = this.noise(0.25);
        const bp = this.ctx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 1400; bp.Q.value = 1.5;
        const g2 = this.ctx.createGain();
        g2.gain.setValueAtTime(0.35, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        n.connect(bp); bp.connect(g2); g2.connect(this.master);
        n.start(t); n.stop(t + 0.25);
        // Short sub-thump
        const sub = this.ctx.createOscillator();
        const g3 = this.ctx.createGain();
        sub.type = 'sine';
        sub.frequency.setValueAtTime(120, t);
        sub.frequency.exponentialRampToValueAtTime(50, t + 0.1);
        g3.gain.setValueAtTime(0.25, t);
        g3.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        sub.connect(g3); g3.connect(this.master);
        sub.start(t); sub.stop(t + 0.12);
    },

    scrape() { // hull grinding against land — sustained metallic grind
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const dur = 0.4;
        // Grinding noise layer (resonant bandpass)
        const n1 = this.noise(dur);
        const bp1 = this.ctx.createBiquadFilter();
        bp1.type = 'bandpass'; bp1.frequency.value = 1800; bp1.Q.value = 3;
        bp1.frequency.setValueAtTime(1800, t);
        bp1.frequency.linearRampToValueAtTime(1200, t + dur);
        const g1 = this.ctx.createGain();
        g1.gain.setValueAtTime(0.2, t);
        g1.gain.setValueAtTime(0.15, t + 0.05);
        g1.gain.setValueAtTime(0.22, t + 0.1);
        g1.gain.setValueAtTime(0.12, t + 0.2);
        g1.gain.exponentialRampToValueAtTime(0.001, t + dur);
        n1.connect(bp1); bp1.connect(g1); g1.connect(this.master);
        n1.start(t); n1.stop(t + dur);
        // Lower metal stress layer
        const n2 = this.noise(dur);
        const bp2 = this.ctx.createBiquadFilter();
        bp2.type = 'bandpass'; bp2.frequency.value = 500; bp2.Q.value = 2;
        const g2 = this.ctx.createGain();
        g2.gain.setValueAtTime(0.12, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.8);
        n2.connect(bp2); bp2.connect(g2); g2.connect(this.master);
        n2.start(t); n2.stop(t + dur);
        // LFO modulation for irregular grinding texture
        const lfo = this.ctx.createOscillator();
        const lfoG = this.ctx.createGain();
        lfo.frequency.value = 18;
        lfoG.gain.value = 6;
        lfo.connect(lfoG); lfoG.connect(bp1.Q);
        lfo.start(t); lfo.stop(t + dur);
    },

    radioStatic() { // encounter opens — radio squelch + crackle
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        // Opening squelch tone
        const sq = this.ctx.createOscillator();
        const sqG = this.ctx.createGain();
        sq.type = 'sawtooth';
        sq.frequency.setValueAtTime(600, t);
        sq.frequency.exponentialRampToValueAtTime(1200, t + 0.04);
        sqG.gain.setValueAtTime(0.08, t);
        sqG.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        sq.connect(sqG); sqG.connect(this.master);
        sq.start(t); sq.stop(t + 0.06);
        // Main static body with modulated bandpass
        const n = this.noise(0.9);
        const bp = this.ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.setValueAtTime(1800, t);
        bp.frequency.setValueAtTime(1200, t + 0.15);
        bp.frequency.setValueAtTime(2000, t + 0.3);
        bp.frequency.setValueAtTime(1400, t + 0.5);
        bp.Q.value = 4;
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.18, t + 0.02);
        g.gain.setValueAtTime(0.06, t + 0.12);
        g.gain.setValueAtTime(0.14, t + 0.2);
        g.gain.setValueAtTime(0.04, t + 0.35);
        g.gain.setValueAtTime(0.1, t + 0.45);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        n.connect(bp); bp.connect(g); g.connect(this.master);
        n.start(t); n.stop(t + 0.9);
        // Crackle pops (short noise bursts)
        [0.08, 0.19, 0.33, 0.52].forEach(offset => {
            const pop = this.noise(0.03);
            const pg = this.ctx.createGain();
            pg.gain.setValueAtTime(0.15, t + offset);
            pg.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.02);
            pop.connect(pg); pg.connect(this.master);
            pop.start(t + offset); pop.stop(t + offset + 0.03);
        });
    },

    tollPay() { // payment — metallic register ding + coin rattle
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        // Bright ding (sine + harmonic)
        const osc = this.ctx.createOscillator();
        const g1 = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 1568; // G6
        g1.gain.setValueAtTime(0.15, t);
        g1.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        osc.connect(g1); g1.connect(this.master);
        osc.start(t); osc.stop(t + 0.35);
        // Harmonic shimmer
        const osc2 = this.ctx.createOscillator();
        const g2 = this.ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = 3136; // G7
        g2.gain.setValueAtTime(0.05, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc2.connect(g2); g2.connect(this.master);
        osc2.start(t); osc2.stop(t + 0.2);
        // Descending coin tumble
        const osc3 = this.ctx.createOscillator();
        const g3 = this.ctx.createGain();
        osc3.type = 'triangle';
        osc3.frequency.setValueAtTime(1200, t + 0.06);
        osc3.frequency.setValueAtTime(900, t + 0.12);
        osc3.frequency.setValueAtTime(680, t + 0.18);
        g3.gain.setValueAtTime(0.001, t);
        g3.gain.setValueAtTime(0.07, t + 0.06);
        g3.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc3.connect(g3); g3.connect(this.master);
        osc3.start(t); osc3.stop(t + 0.25);
    },

    death() { // ship destroyed — multi-stage destruction sequence
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        // Stage 1: Initial blast crack
        const n1 = this.noise(0.2);
        const hp = this.ctx.createBiquadFilter();
        hp.type = 'bandpass'; hp.frequency.value = 2000; hp.Q.value = 0.5;
        const g1 = this.ctx.createGain();
        g1.gain.setValueAtTime(0.5, t);
        g1.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        n1.connect(hp); hp.connect(g1); g1.connect(this.master);
        n1.start(t); n1.stop(t + 0.2);
        // Stage 2: Heavy rolling rumble
        const n2 = this.noise(2.5);
        const lp = this.ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.setValueAtTime(500, t);
        lp.frequency.exponentialRampToValueAtTime(25, t + 2.2);
        const dist = this.distortion(12);
        const g2 = this.ctx.createGain();
        g2.gain.setValueAtTime(0.15, t);
        g2.gain.linearRampToValueAtTime(0.55, t + 0.3);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
        n2.connect(lp); lp.connect(dist); dist.connect(g2); g2.connect(this.master);
        n2.start(t); n2.stop(t + 2.5);
        // Stage 3: Metal stress groan (descending sawtooth)
        const groan = this.ctx.createOscillator();
        const gG = this.ctx.createGain();
        groan.type = 'sawtooth';
        groan.frequency.setValueAtTime(180, t + 0.1);
        groan.frequency.exponentialRampToValueAtTime(30, t + 1.8);
        const gF = this.ctx.createBiquadFilter();
        gF.type = 'lowpass'; gF.frequency.value = 300;
        gG.gain.setValueAtTime(0.001, t);
        gG.gain.linearRampToValueAtTime(0.15, t + 0.3);
        gG.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
        groan.connect(gF); gF.connect(gG); gG.connect(this.master);
        groan.start(t); groan.stop(t + 1.8);
        // Stage 4: Sub-bass death drop
        const sub = this.ctx.createOscillator();
        const g4 = this.ctx.createGain();
        sub.type = 'sine';
        sub.frequency.setValueAtTime(60, t);
        sub.frequency.exponentialRampToValueAtTime(15, t + 2.0);
        g4.gain.setValueAtTime(0.4, t);
        g4.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
        sub.connect(g4); g4.connect(this.master);
        sub.start(t); sub.stop(t + 2.0);
        // Stage 5: Secondary explosion (delayed)
        const n3 = this.noise(0.5);
        const lp2 = this.ctx.createBiquadFilter();
        lp2.type = 'lowpass'; lp2.frequency.value = 400;
        const g5 = this.ctx.createGain();
        g5.gain.setValueAtTime(0.001, t);
        g5.gain.setValueAtTime(0.35, t + 0.4);
        g5.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
        n3.connect(lp2); lp2.connect(g5); g5.connect(this.master);
        n3.start(t); n3.stop(t + 1.0);
        // Fade music
        this.fadeMusic(0, 2000);
    },

    success() { // transit complete — triumphant brass-like fanfare
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        // Rich ascending chord: C5, E5, G5, C6 with harmonics
        const notes = [
            { f: 523, d: 0.00, type: 'sine' },    // C5
            { f: 659, d: 0.10, type: 'sine' },    // E5
            { f: 784, d: 0.20, type: 'sine' },    // G5
            { f: 1047, d: 0.32, type: 'sine' },   // C6
        ];
        notes.forEach(n => {
            // Fundamental
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.type = n.type;
            osc.frequency.value = n.f;
            g.gain.setValueAtTime(0.001, t + n.d);
            g.gain.linearRampToValueAtTime(0.12, t + n.d + 0.03);
            g.gain.setValueAtTime(0.10, t + n.d + 0.15);
            g.gain.exponentialRampToValueAtTime(0.001, t + n.d + 0.6);
            osc.connect(g); g.connect(this.master);
            osc.start(t + n.d); osc.stop(t + n.d + 0.6);
            // 2nd harmonic for warmth
            const h = this.ctx.createOscillator();
            const hg = this.ctx.createGain();
            h.type = 'sine';
            h.frequency.value = n.f * 2;
            hg.gain.setValueAtTime(0.001, t + n.d);
            hg.gain.linearRampToValueAtTime(0.03, t + n.d + 0.03);
            hg.gain.exponentialRampToValueAtTime(0.001, t + n.d + 0.4);
            h.connect(hg); hg.connect(this.master);
            h.start(t + n.d); h.stop(t + n.d + 0.4);
        });
        // Final sustained chord (all notes ring together)
        [523, 659, 784, 1047].forEach(f => {
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = f;
            g.gain.setValueAtTime(0.001, t + 0.45);
            g.gain.linearRampToValueAtTime(0.06, t + 0.55);
            g.gain.exponentialRampToValueAtTime(0.001, t + 1.4);
            osc.connect(g); g.connect(this.master);
            osc.start(t + 0.45); osc.stop(t + 1.4);
        });
    },

    _warnOsc: null,
    warnStart() { // hull warning — urgent two-tone naval alarm
        if (!this.ctx || this._warnOsc) return;
        // Two alternating tones for urgency
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = 380;
        g.gain.value = 0.0;
        const filt = this.ctx.createBiquadFilter();
        filt.type = 'lowpass'; filt.frequency.value = 800;
        // LFO alternates pitch between two tones
        const lfo = this.ctx.createOscillator();
        lfo.type = 'square';
        lfo.frequency.value = 2.5;
        const lfoG = this.ctx.createGain();
        lfoG.gain.value = 80; // swings between ~300 and ~460 Hz
        lfo.connect(lfoG); lfoG.connect(osc.frequency);
        // Amplitude pulse
        const ampLfo = this.ctx.createOscillator();
        ampLfo.type = 'square';
        ampLfo.frequency.value = 2.5;
        const ampG = this.ctx.createGain();
        ampG.gain.value = 0.025;
        ampLfo.connect(ampG); ampG.connect(g.gain);
        g.gain.value = 0.04;
        osc.connect(filt); filt.connect(g); g.connect(this.master);
        osc.start(); lfo.start(); ampLfo.start();
        this._warnOsc = { osc, lfo, ampLfo, gain: g, filt };
    },
    warnStop() {
        if (!this._warnOsc) return;
        const t = this.ctx.currentTime;
        this._warnOsc.gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        const w = this._warnOsc;
        setTimeout(() => { w.osc.stop(); w.lfo.stop(); w.ampLfo.stop(); }, 200);
        this._warnOsc = null;
    },

    // Continuous engine — multi-oscillator with mechanical texture
    _engineOsc: null,
    engineStart() {
        if (!this.ctx || this._engineOsc) return;
        // Fundamental chug
        const osc1 = this.ctx.createOscillator();
        osc1.type = 'triangle';
        osc1.frequency.value = 42;
        // Detuned harmonic for thickness
        const osc2 = this.ctx.createOscillator();
        osc2.type = 'sawtooth';
        osc2.frequency.value = 84.5; // slight detune from 2nd harmonic
        const filt = this.ctx.createBiquadFilter();
        filt.type = 'lowpass'; filt.frequency.value = 200;
        // Mechanical noise layer
        const n = this.noise(0);
        const nFilt = this.ctx.createBiquadFilter();
        nFilt.type = 'bandpass'; nFilt.frequency.value = 120; nFilt.Q.value = 3;
        const nG = this.ctx.createGain();
        nG.gain.value = 0.015;
        n.connect(nFilt); nFilt.connect(nG);
        // Mix into gain
        const g = this.ctx.createGain();
        g.gain.value = 0.05;
        osc1.connect(g);
        osc2.connect(filt); filt.connect(g);
        nG.connect(g);
        g.connect(this.master);
        osc1.start(); osc2.start(); n.start();
        this._engineOsc = { osc1, osc2, noise: n, gain: g, filt, nFilt, nG };
    },
    engineUpdate(speed) {
        if (!this._engineOsc) return;
        const base = 35 + speed * 0.12;
        this._engineOsc.osc1.frequency.value = base;
        this._engineOsc.osc2.frequency.value = base * 2.01; // slight detune
        this._engineOsc.filt.frequency.value = 120 + speed * 0.5;
        this._engineOsc.nFilt.frequency.value = 80 + speed * 0.3;
        this._engineOsc.gain.gain.value = 0.04 + speed * 0.0004;
    },
    engineStop() {
        if (!this._engineOsc) return;
        this._engineOsc.gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
        const e = this._engineOsc;
        setTimeout(() => { e.osc1.stop(); e.osc2.stop(); e.noise.stop(); }, 350);
        this._engineOsc = null;
    },
};

// ---- Resize ----
let scale = 1, viewW = 0;
function resize() {
    cw = window.innerWidth;
    ch = window.innerHeight;
    dpr = window.devicePixelRatio || 1;
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if (cw < ch && cw < 800) {
        scale = cw / 1000;
    } else {
        scale = ch / WORLD_H;
    }
    viewW = cw / scale;
    if (typeof updateDpadGeom === 'function') updateDpadGeom();
}

// ---- D-Pad geometry (computed after resize) ----
let dpadCx = 0, dpadCy = 0, dpadR = 0, dpadInnerR = 0, dpadKnobX = 0, dpadKnobY = 0;
function updateDpadGeom() {
    dpadR = Math.min(65, Math.max(40, ch * 0.15));
    dpadInnerR = dpadR * 0.38;
    dpadCx = dpadR + 25;
    dpadCy = ch - dpadR - 25;
}

function hitTestDpad(tx, ty) {
    const dx = tx - dpadCx, dy = ty - dpadCy;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d > dpadR * 1.3) return null; // outside
    if (d < dpadInnerR) return 'center';
    const angle = Math.atan2(dy, dx);
    if (angle > -Math.PI/4 && angle <= Math.PI/4) return 'right';
    if (angle > Math.PI/4 && angle <= 3*Math.PI/4) return 'down';
    if (angle > -3*Math.PI/4 && angle <= -Math.PI/4) return 'up';
    return 'left';
}

function clearDpad() {
    if (game && game.dpad) { game.dpad.up=false; game.dpad.down=false; game.dpad.left=false; game.dpad.right=false; }
    dpadKnobX = 0; dpadKnobY = 0;
}

function processDpadTouches(touches) {
    clearDpad();
    for (let i = 0; i < touches.length; i++) {
        const t = touches[i];
        const dx = t.clientX - dpadCx, dy = t.clientY - dpadCy;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > dpadR * 1.3) continue; // outside pad
        if (!game || !game.dpad) continue;

        // Axis-based input — allows diagonal (steer + speed at once)
        const nx = dx / dpadR, ny = dy / dpadR;
        const deadzone = 0.25;
        if (nx > deadzone) game.dpad.right = true;
        if (nx < -deadzone) game.dpad.left = true;
        if (ny > deadzone) game.dpad.down = true;
        if (ny < -deadzone) game.dpad.up = true;

        // Track finger offset for knob visual
        const maxD = dpadR * 0.65;
        const clampF = d > maxD ? maxD / d : 1;
        dpadKnobX = dx * clampF;
        dpadKnobY = dy * clampF;
    }
}

// ---- Utility ----
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,lo,hi){ return v<lo?lo:v>hi?hi:v; }
function rand(a,b){ return a+Math.random()*(b-a); }
function randInt(a,b){ return Math.floor(rand(a,b+1)); }
function dist(x1,y1,x2,y2){ const dx=x1-x2,dy=y1-y2; return Math.sqrt(dx*dx+dy*dy); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function fmtMoney(n){
    if(Math.abs(n)>=1e9) return '$'+(n/1e9).toFixed(1)+'B';
    if(Math.abs(n)>=1e6) return '$'+(n/1e6).toFixed(1)+'M';
    if(Math.abs(n)>=1e3) return '$'+(n/1e3).toFixed(0)+'K';
    return '$'+n.toFixed(0);
}

// ---- Text Drawing ----
function drawText(text, x, y, opts={}){
    const size = opts.size||14;
    const col = opts.color||C_GREEN;
    const align = opts.align||'left';
    const glow = opts.glow||0;
    ctx.save();
    ctx.font = (opts.bold?'bold ':'')+size+'px '+FONT;
    ctx.fillStyle = col;
    ctx.textAlign = align;
    ctx.textBaseline = opts.baseline||'top';
    if(glow>0){ ctx.shadowColor=col; ctx.shadowBlur=glow; }
    ctx.fillText(text, x, y);
    if(glow>1){ ctx.fillText(text, x, y); }
    ctx.restore();
}
function wrapText(text, x, y, maxW, lineH, opts={}){
    const size = opts.size||14;
    ctx.font = (opts.bold?'bold ':'')+size+'px '+FONT;
    const words = text.split(' ');
    let line = '', cy = y;
    for(const w of words){
        const test = line + w + ' ';
        if(ctx.measureText(test).width > maxW && line !== ''){
            drawText(line.trim(), x, cy, opts);
            line = w + ' ';
            cy += lineH;
        } else { line = test; }
    }
    drawText(line.trim(), x, cy, opts);
    return cy + lineH;
}

// ---- Terrain ----
function iranCoastY(wx){
    let y = 90;
    y += Math.sin(wx*0.0007)*25;
    y += Math.sin(wx*0.002)*12;
    y += Math.sin(wx*0.005)*6;
    y += Math.sin(wx*0.013)*4;
    y += Math.sin(wx*0.029+1.3)*2.5;
    const p = wx/MAP_W;
    y += Math.sin(p*Math.PI)*75;
    return y;
}
function omanCoastY(wx){
    let y = WORLD_H - 90;
    y -= Math.sin(wx*0.0009)*20;
    y -= Math.sin(wx*0.0025)*15;
    y -= Math.sin(wx*0.006)*5;
    y -= Math.sin(wx*0.015)*4;
    y -= Math.sin(wx*0.033+2.1)*2.5;
    const p = wx/MAP_W;
    y -= Math.sin(p*Math.PI)*75;
    return y;
}
// Qeshm Island: hangs down from Iran coast in the middle section
function qeshmY(wx){
    if(wx<4500||wx>7800) return -1;
    const t = (wx-4500)/3300;
    const h = Math.sin(t*Math.PI)*110;
    return iranCoastY(wx) + h;
}
function waterTop(wx){ const q=qeshmY(wx); return q>0? q+8 : iranCoastY(wx)+8; }
function waterBot(wx){ return omanCoastY(wx)-8; }

// ---- Obstacle Generation ----
function generateMap(){
    const f = game.flag;
    obstacles = [];
    drones = [];
    encounterZones = [];

    // Mines
    const nMines = Math.floor(40 * f.mines);
    for(let i=0;i<nMines;i++){
        const wx = rand(800, MAP_W-800);
        const top = waterTop(wx)+20;
        const bot = waterBot(wx)-20;
        if(bot-top < 40) continue;
        obstacles.push({ type:'mine', x:wx, y:rand(top,bot), r:MINE_R, dmg:MINE_DMG, active:true, phase:rand(0,5) });
    }

    // Debris
    const nDebris = Math.floor(20 * f.debris);
    for(let i=0;i<nDebris;i++){
        const wx = rand(1200, MAP_W-800);
        const top = waterTop(wx)+25;
        const bot = waterBot(wx)-25;
        if(bot-top < 50) continue;
        obstacles.push({ type:'debris', x:wx, y:rand(top,bot), r:DEBRIS_R, dmg:DEBRIS_DMG, active:true, angle:rand(-0.5,0.5) });
    }

    // Wrecks (scenery only)
    const wreckXs = [1800, 4200, 6300, 9500, 12500];
    for(const wx of wreckXs){
        const side = Math.random()>0.5;
        const wy = side ? iranCoastY(wx)+rand(2,18) : omanCoastY(wx)-rand(2,18);
        obstacles.push({ type:'wreck', x:wx, y:wy, r:0, dmg:0, active:false,
            angle:rand(-0.6,0.6), name:pick(['MV Prosperity','Mayuree Naree','MT Salvation','Hadi Pioneer','Star Zenith']) });
    }

    // Drone waves (spawn data)
    const nWaves = Math.floor(10 * f.drones);
    for(let i=0;i<nWaves;i++){
        const wx = rand(2000, MAP_W-2000);
        const count = randInt(2,4);
        for(let j=0;j<count;j++){
            drones.push({ x:wx+rand(-200,200), y:-50, vy:DRONE_SPEED, spawned:false, active:false, spent:false, spawnX:wx+rand(-100,100) });
        }
    }

    // Encounter zones
    for(let i=0;i<Math.min(f.maxEnc, 3);i++){
        encounterZones.push({ x:ENCOUNTER_XS[i], triggered:false, intensity:i });
    }

    // Islets — small rocky islands near coastlines
    islets = [];
    for(let i=0;i<18;i++){
        const wx = rand(400, MAP_W-400);
        const nearIran = Math.random()>0.5;
        const coastY = nearIran ? iranCoastY(wx) : omanCoastY(wx);
        const offset = nearIran ? rand(15,55) : -rand(15,55);
        const r = rand(10,28);
        // generate a jagged outline (6-9 vertices)
        const verts = randInt(6,9);
        const pts = [];
        for(let v=0;v<verts;v++){
            const a = (v/verts)*Math.PI*2;
            const rr = r * rand(0.5,1.0);
            pts.push({dx:Math.cos(a)*rr, dy:Math.sin(a)*rr});
        }
        islets.push({ x:wx, y:coastY+offset, pts, r });
    }

    // Docks / piers — extend from coastlines
    docks = [];
    const dockXs = [900,2400,3600,5800,8400,10200,11800,13500];
    for(const wx of dockXs){
        const nearIran = Math.random()>0.5;
        const coastY = nearIran ? iranCoastY(wx) : omanCoastY(wx);
        const dir = nearIran ? 1 : -1;
        const len = rand(25,50);
        const piers = randInt(1,3);
        docks.push({ x:wx, coastY, dir, len, piers, width:rand(4,8) });
    }
}

// ---- Scoring ----
function calcScore(){
    if(!player.alive && game.screen==='gameOver') return 0;
    const f = game.flag;
    if(f.key==='iran') return 0;
    const pct = clamp((player.x-300)/(MAP_W-600), 0, 1);
    const base = CARGO_BASE * pct;
    const dmgCost = ((MAX_HP - player.hp)/MAX_HP)*REPAIR_MAX;
    let s = base*f.multi - player.tollsPaid - dmgCost;
    if(game.gameTime<120) s*=1.3; else if(game.gameTime<180) s*=1.1;
    if(player.hp===MAX_HP) s*=1.5;
    return Math.max(0, Math.round(s));
}

// ---- Particles ----
function spawnParticles(x,y,count,col,spd,sz){
    for(let i=0;i<count;i++){
        const a=rand(0,Math.PI*2), sp=rand(spd*0.3,spd);
        particles.push({x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, decay:rand(0.015,0.04), size:rand(sz*0.5,sz), color:col||'#ff6633'});
    }
}
function updateParticles(dt){
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx*dt; p.y+=p.vy*dt;
        p.vx*=0.97; p.vy*=0.97;
        p.life-=p.decay;
        if(p.life<=0) particles.splice(i,1);
    }
}
function renderParticles(){
    for(const p of particles){
        const sx=wToSx(p.x), sy=wToSy(p.y);
        if(sx<-20||sx>cw+20) continue;
        ctx.globalAlpha = p.life*0.8;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(sx, sy, p.size*scale, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha=1;
}

// ---- Start Transit ----
function startTransit(){
    if (_deathTimeout) { clearTimeout(_deathTimeout); _deathTimeout = null; }
    SFX.engineStart();
    SFX.blip();
    SFX.playMusic();
    const f = FLAGS[game.flagIdx];
    game.flag = f;
    game.gameTime = 0;
    game.encounter = { active:false, phase:'', intensity:0, result:null, timer:0, choiceIdx:-1 };
    game.damageFlash = 0;
    game.screenShake = 0;
    game.radioMsg = '';
    game.radioTimer = 0;
    player.x = 400;
    player.y = WORLD_H/2;
    player.vx = BASE_SPEED;
    player.vy = 0;
    player.hp = MAX_HP;
    player.tollsPaid = 0;
    player.alive = true;
    player.angle = 0;
    camera.x = 0;
    particles = [];
    generateMap();
    game.screen = 'briefing';
    game.briefTimer = 0;
}

// ---- Game Over ----
function triggerGameOver(survived){
    if(game.screen === 'gameOver') return;
    _deathTimeout = null;
    SFX.engineStop();
    SFX.warnStop();
    if (survived) SFX.success(); else SFX.death();
    game.screen = 'gameOver';
    game.survived = survived;
    game.transitPct = clamp((player.x-300)/(MAP_W-600),0,1);
    game.score = survived ? calcScore() : 0;
    game.overTimer = 0;

    const f = game.flag;
    if(f.key==='iran'){
        game.headline = pick(H_IRAN);
        game.lastWords = '';
    } else if(survived){
        game.headline = pick(H_SUCCESS[f.key]||H_SUNK.generic);
        game.lastWords = '';
    } else {
        const pool = (H_SUNK[f.key]||[]).concat(H_SUNK.generic);
        game.headline = pick(pool);
        game.lastWords = LAST_WORDS[f.key]||'';
    }
}

// ---- Encounter Resolution ----
function resolveChoice(choiceIdx){
    const f = game.flag;
    const intensity = game.encounter.intensity;
    let dmg=0, cost=0, text='';

    switch(choiceIdx){
        case 0: // Pay toll
            cost = f.toll * (1 + intensity*0.5);
            text = pick(TOLL_TEXTS);
            break;
        case 1: { // Refuse
            const chance = (1-f.threat)*(1-intensity*0.22);
            if(Math.random()<chance){
                text = REFUSE_OK[f.key]||"They grumble and leave. Bold move.";
            } else {
                dmg = 15+intensity*13;
                text = pick(REFUSE_FAIL);
            }
            break;
        }
        case 2: { // Bluff
            const chance = f.bluff*(1-intensity*0.18);
            if(Math.random()<chance){
                text = BLUFF_OK[f.key]||"Your bluff works. Somehow.";
            } else {
                dmg = 15+intensity*12;
                text = BLUFF_FAIL[f.key]||"They see right through you. Guns follow.";
            }
            break;
        }
        case 3: { // Escort
            const chance = f.escort*(1-intensity*0.12);
            if(Math.random()<chance){
                text = ESCORT_OK[f.key]||"A warship appears. The patrol retreats.";
            } else {
                dmg = 8+intensity*7;
                text = pick(ESCORT_FAIL);
            }
            break;
        }
        case 4: { // Go dark
            const chance = f.stealth*(1-intensity*0.25);
            if(Math.random()<chance){
                text = pick(DARK_OK);
            } else {
                dmg = 20+intensity*15;
                text = pick(DARK_FAIL);
            }
            break;
        }
    }

    player.tollsPaid += cost;
    if(dmg>0){
        SFX.droneHit();
        player.hp = Math.max(0, player.hp-dmg);
        game.damageFlash = 1;
        game.screenShake = 3;
        spawnParticles(player.x, player.y, 15, '#ff4400', 80, 3);
    }

    if (cost>0) SFX.tollPay();
    const costStr = cost>0 ? ' (-'+fmtMoney(cost)+')' : '';
    const dmgStr = dmg>0 ? ' ['+dmg+' HULL DAMAGE]' : '';
    game.encounter.result = text + costStr + dmgStr;
    game.encounter.phase = 'result';
    game.encounter.timer = 0;
}

function tryFullscreen() {

}

function updateGameplay(dt){
    if(!player.alive) return;
    const f = game.flag;
    game.gameTime += dt;

    // Player movement
    let targetVX = BASE_SPEED;
    if(keys['d']||keys['arrowright']) targetVX += SPEED_BOOST;
    if(keys['a']||keys['arrowleft']) targetVX -= SPEED_BRAKE;
    // D-pad speed (mobile)
    if(game.dpad.right) targetVX += SPEED_BOOST;
    if(game.dpad.left) targetVX -= SPEED_BRAKE;
    targetVX = Math.max(35, targetVX);
    player.vx += (targetVX-player.vx)*3.5*dt;

    let vi = 0;
    if(keys['w']||keys['arrowup']) vi = -1;
    if(keys['s']||keys['arrowdown']) vi = 1;
    // D-pad steering (mobile)
    if(game.dpad.up) vi = -1;
    if(game.dpad.down) vi = 1;
    player.vy += vi*VERT_ACCEL*dt;
    player.vy *= Math.max(0, 1-VERT_DRAG*dt);
    player.vy = clamp(player.vy, -MAX_VY, MAX_VY);

    player.x += player.vx*dt;
    player.y += player.vy*dt;

    // Clamp to water + LAND COLLISION DAMAGE
    const top = waterTop(player.x)+PLAYER_R;
    const bot = waterBot(player.x)-PLAYER_R;
    game.landDmgTimer -= dt;
    let hitLand = false;
    if(player.y < top){ player.y=top; player.vy=Math.abs(player.vy)*0.2; hitLand=true; }
    if(player.y > bot){ player.y=bot; player.vy=-Math.abs(player.vy)*0.2; hitLand=true; }

    // Islet collision
    for(const il of islets){
        const d = dist(player.x, player.y, il.x, il.y);
        if(d < PLAYER_R + il.r){
            hitLand = true;
            // Push player out
            const angle = Math.atan2(player.y - il.y, player.x - il.x);
            player.x = il.x + Math.cos(angle)*(PLAYER_R + il.r + 1);
            player.y = il.y + Math.sin(angle)*(PLAYER_R + il.r + 1);
            player.vy *= -0.3;
        }
    }

    // Dock collision
    for(const dk of docks){
        const dockEndY = dk.coastY + dk.dir * dk.len;
        const dockMinY = Math.min(dk.coastY, dockEndY);
        const dockMaxY = Math.max(dk.coastY, dockEndY);
        const hw = dk.width * 0.5 + PLAYER_R;
        if(player.x > dk.x - hw && player.x < dk.x + hw && player.y > dockMinY - PLAYER_R && player.y < dockMaxY + PLAYER_R){
            hitLand = true;
            // Push away horizontally
            if(player.x < dk.x) player.x = dk.x - hw - 1;
            else player.x = dk.x + hw + 1;
        }
    }

    // Apply land damage with cooldown
    if(hitLand && game.landDmgTimer <= 0){
        const dmg = Math.round(LAND_DMG_PER_SEC * LAND_DMG_COOLDOWN);
        player.hp = Math.max(0, player.hp - dmg);
        game.damageFlash = 0.6;
        game.screenShake = 2;
        spawnParticles(player.x, player.y, 6, '#aa8855', 50, 2);
        SFX.scrape();
        game.landDmgTimer = LAND_DMG_COOLDOWN;
        if(player.hp<=0){ player.alive=false; spawnParticles(player.x,player.y,40,'#ff6600',120,5); _deathTimeout=setTimeout(()=>triggerGameOver(false),1500); return; }
    }

    // Visual angle
    player.angle = Math.atan2(player.vy, player.vx)*0.25;

    // Camera
    camera.x = player.x - viewW*0.3;

    // Wake particles
    if(Math.random()<0.5){
        particles.push({x:player.x-48, y:player.y-12+rand(-2,2), vx:-rand(18,35), vy:rand(-10,-4), life:1, decay:0.02, size:rand(2,3.5), color:'rgba(150,200,255,0.4)'});
        particles.push({x:player.x-48, y:player.y+12+rand(-2,2), vx:-rand(18,35), vy:rand(4,10), life:1, decay:0.02, size:rand(2,3.5), color:'rgba(150,200,255,0.4)'});
    }

    // Collision: mines & debris
    for(const o of obstacles){
        if(!o.active||o.r===0) continue;
        const d = dist(player.x, player.y, o.x, o.y);
        if(d < PLAYER_R + o.r){
            o.active = false;
            player.hp = Math.max(0, player.hp - o.dmg);
            game.damageFlash = 1;
            game.screenShake = o.type==='mine'?4:2;
            spawnParticles(o.x, o.y, o.type==='mine'?25:12, o.type==='mine'?'#ff4400':'#aa8855', 100, 3);
            if (o.type==='mine') SFX.explosion(); else SFX.scrape();
            if(player.hp<=0){ player.alive=false; spawnParticles(player.x,player.y,40,'#ff6600',120,5); _deathTimeout=setTimeout(()=>triggerGameOver(false),1500); return; }
        }
    }

    // Drones: spawn & update
    for(const dr of drones){
        if(dr.spent) continue;
        if(!dr.spawned && Math.abs(player.x - dr.spawnX)<viewW*0.6){
            dr.spawned = true;
            dr.active = true;
            dr.x = dr.spawnX + rand(-50,50);
            dr.y = waterTop(dr.spawnX)-20;
        }
        if(dr.active){
            dr.y += dr.vy*dt;
            if(dr.y > waterBot(dr.x)+50){ dr.spent=true; dr.active=false; continue; }
            if(dist(player.x,player.y,dr.x,dr.y)<PLAYER_R+DRONE_R){
                dr.active=false; dr.spent=true;
                player.hp = Math.max(0, player.hp-DRONE_DMG);
                game.damageFlash = 1;
                game.screenShake = 3;
                spawnParticles(dr.x, dr.y, 18, '#ff2200', 90, 2.5);
                SFX.droneHit();
                if(player.hp<=0){ player.alive=false; spawnParticles(player.x,player.y,40,'#ff6600',120,5); _deathTimeout=setTimeout(()=>triggerGameOver(false),1500); return; }
            }
        }
    }

    // Encounter zones
    for(const ez of encounterZones){
        if(ez.triggered) continue;
        if(Math.abs(player.x-ez.x)<250){
            ez.triggered = true;
            game.encounter.active = true;
            game.encounter.phase = 'dialogue';
            game.encounter.intensity = ez.intensity;
            game.encounter.result = null;
            game.encounter.timer = 0;
            game.encounter.choiceIdx = -1;
            SFX.engineStop();
            SFX.fadeMusic(SFX.musicVol*0.2, 500);
            SFX.radioStatic();
        }
    }

    // Radio chatter (all flags)
    game.radioTimer -= dt;
    if(game.radioTimer <= 0){
        const pct = clamp((player.x-300)/(MAP_W-600), 0, 1);
        const pool = [];
        // Country-specific messages (weighted heavier)
        if(RADIO[f.key]) pool.push(...RADIO[f.key], ...RADIO[f.key]);
        // Checkpoint messages near ~25% and ~65% transit
        if((pct > 0.20 && pct < 0.30) || (pct > 0.60 && pct < 0.70)){
            pool.push(...RADIO._checkpoint, ...RADIO._checkpoint);
        }
        // General messages
        pool.push(...RADIO._general);
        game.radioMsg = pick(pool);
        game.radioTimer = rand(6, 12);
    }

    // Transit complete
    if(player.x >= MAP_W - 300){
        triggerGameOver(true);
    }

    // Particles & effects
    updateParticles(dt);
    SFX.engineUpdate(player.vx);
    if (player.hp < 30) SFX.warnStart(); else SFX.warnStop();
    game.damageFlash *= 0.93;
    game.screenShake *= 0.82;
}

function updateEncounter(dt){
    game.encounter.timer += dt;
    const enc = game.encounter;

    if(enc.phase==='dialogue'){
        // Wait for choice (1-5)
        for(let i=1;i<=5;i++){
            if(keys[String(i)]){
                keys[String(i)]=false;
                resolveChoice(i-1);
                return;
            }
        }
        // Mouse / tap on choices
        if(mouseClick && enc._choiceYs){
            const mob = cw<600;
            const pad = mob?12:20;
            const choiceH = Math.max(28, ch*0.06);
            const panelW = mob ? cw*0.94 : Math.min(620, cw*0.82);
            const px = (cw-panelW)/2;
            for(let i=0;i<5;i++){
                const cy = enc._choiceYs[i];
                if(cy && mouseX>px+pad && mouseX<px+panelW-pad && mouseY>cy && mouseY<cy+choiceH){
                    resolveChoice(i); mouseClick=false; return;
                }
            }
            mouseClick=false;
        }
    }

    if(enc.phase==='result'){
        if(enc.timer>1.5 && (keys['enter']||keys[' ']||mouseClick)){
            enc.active = false;
            SFX.fadeMusic(SFX.musicVol, 800);
            if (player.alive) SFX.engineStart();
            game.screen = 'gameplay';
            keys['enter']=false; keys[' ']=false; mouseClick=false;
            if(player.hp<=0){ player.alive=false; _deathTimeout=setTimeout(()=>triggerGameOver(false),500); }
        }
    }
}

function shareResult(){
    const f = game.flag;
    const url = window.location.origin + window.location.pathname;
    let lines = 'HORMUZ RUN \u{1F6A2}\n\n';
    lines += '\u201C' + game.headline + '\u201D\n\n';
    if(f.key==='iran'){
        lines += f.emoji+' Iran \u2014 $0. Vibes: Immaculate.';
    } else if(game.survived){
        lines += f.emoji+' '+f.name+' ('+f.diff+') \u2014 '+fmtMoney(game.score);
    } else {
        lines += f.emoji+' '+f.name+' \u2014 Sunk at '+Math.round(game.transitPct*100)+'%';
    }
    if(navigator.share){
        navigator.share({text:lines+'\n\n', url:url}).catch(()=>{});
    } else {
        window.open('https://x.com/intent/tweet?text='+encodeURIComponent(lines)+'&url='+encodeURIComponent(url),'_blank');
    }
    SFX.blip();
}

function updateGameOver(dt){
    game.overTimer += dt;
    if(game.overTimer>1){
        if(keys['x']){ keys['x']=false; shareResult(); }
        if(keys['r']){ keys['r']=false; startTransit(); }
        if(keys['f']){ keys['f']=false; game.screen='flagSelect'; }
        if(mouseClick){
            // Share button hit test first
            if(mouseX>_shareBtn.x && mouseX<_shareBtn.x+_shareBtn.w && mouseY>_shareBtn.y && mouseY<_shareBtn.y+_shareBtn.h){
                shareResult();
            } else if(mouseX < cw/2){
                startTransit();
            } else {
                game.screen='flagSelect';
            }
            mouseClick=false;
        }
    }
}

function renderTitle(){
    // Background
    ctx.fillStyle = C_WATER;
    ctx.fillRect(0,0,cw,ch);

    // Radar sweep
    const cx=cw/2, cy=ch/2;
    const rr = Math.min(cw, ch)*0.4;
    const sweepAngle = game.titlePulse*0.5;
    ctx.save();
    ctx.translate(cx, cy);
    for(let i=0;i<40;i++){
        const a=sweepAngle-(i/40)*0.8;
        const alpha=(1-i/40)*0.12;
        ctx.strokeStyle = `rgba(51,255,136,${alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
        ctx.stroke();
    }
    // Rings
    ctx.strokeStyle = 'rgba(51,255,136,0.08)';
    ctx.lineWidth = 1;
    for(let r=rr*0.25;r<=rr;r+=rr*0.25){
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();

    // Dots on radar (random blips)
    for(let i=0;i<12;i++){
        const a=i*0.52+game.titlePulse*0.1;
        const r2=rr*(0.2+((i*37)%100)/100*0.7);
        const bx=cx+Math.cos(a)*r2, by=cy+Math.sin(a)*r2;
        const alpha=0.15+Math.sin(game.titlePulse*2+i)*0.15;
        ctx.fillStyle=`rgba(51,255,136,${alpha})`;
        ctx.beginPath(); ctx.arc(bx,by,2.5,0,Math.PI*2); ctx.fill();
    }

    // Title
    drawText('HORMUZ', cx, cy-ch*0.08, {size:Math.min(72,cw*0.1), align:'center', color:C_GREEN, bold:true, glow:20, baseline:'middle'});
    drawText('RUN', cx, cy+ch*0.03, {size:Math.min(72,cw*0.1), align:'center', color:C_GREEN, bold:true, glow:20, baseline:'middle'});

    // Subtitle
    const mob = cw<600;
    drawText('Navigate. Survive. Profit.', cx, cy+65, {size:mob?12:16, align:'center', color:C_GREEN_DIM, baseline:'middle'});

    // Prompt
    if(Math.sin(game.titlePulse*3)>0){
        drawText(mob?'TAP TO START':'PRESS ENTER', cx, ch-80, {size:mob?15:18, align:'center', color:C_GREEN, glow:6, baseline:'middle'});
    }

    drawText('A Strait of Hormuz Transit Simulation', cx, ch-40, {size:mob?9:11, align:'center', color:'#1a5533', baseline:'middle'});
    drawScanlines();
}

        const listTop = hdrBot+6;
        for(let i=0;i<FLAGS.length;i++){
            const f=FLAGS[i], ry=listTop+i*rowH, sel=i===game.flagIdx;
            if(sel){ ctx.fillStyle='rgba(51,255,136,0.08)'; ctx.fillRect(px+4,ry,panelW-8,rowH-2); }
            drawText((sel?'\u25B6 ':'  ')+f.code+' '+f.name, px+pad, ry+6, {size:fs, color:sel?C_GREEN:'#558866', bold:sel});
            drawText(f.diff, px+panelW-pad, ry+6, {size:10, color:f.diffCol, align:'right'});
        }
        const descTop = listTop+FLAGS.length*rowH+6;
        ctx.strokeStyle='#1a5533'; ctx.beginPath(); ctx.moveTo(px+pad,descTop); ctx.lineTo(px+panelW-pad,descTop); ctx.stroke();
        const f=FLAGS[game.flagIdx];
        let yy=descTop+8;
        drawText(f.name+' \u2014 '+f.diff, px+pad, yy, {size:12, color:C_GREEN, bold:true, glow:4});
        yy+=18;
        yy=wrapText('"'+f.desc+'"', px+pad, yy, panelW-pad*2, 15, {size:10, color:'#88aa88'});
        yy+=6;
        const bw=panelW-pad*2-55;
        [{l:'CARGO',v:f.multi/3,c:C_GOLD},{l:'THREAT',v:f.threat,c:C_RED}].forEach(st=>{
            drawText(st.l, px+pad, yy, {size:9, color:'#557755'});
            ctx.fillStyle='#112211'; ctx.fillRect(px+pad+50,yy+2,bw,6);
            ctx.fillStyle=st.c; ctx.fillRect(px+pad+50,yy+2,bw*clamp(st.v,0,1),6);
            yy+=14;
        });
    } else {
        // --- DESKTOP: two column ---
        const listW=panelW*0.5, rowH=35, listTop=hdrBot+10;
        for(let i=0;i<FLAGS.length;i++){
            const f=FLAGS[i], ry=listTop+i*rowH, sel=i===game.flagIdx;
            if(sel){ ctx.fillStyle='rgba(51,255,136,0.08)'; ctx.fillRect(px+10,ry,listW,rowH-2); }
            drawText((sel?'\u25B6 ':'  ')+f.code+'  '+f.name, px+20, ry+8, {size:15, color:sel?C_GREEN:'#558866', bold:sel});
            drawText(f.diff, px+listW-10, ry+8, {size:12, color:f.diffCol, align:'right'});
        }
        ctx.strokeStyle='#1a5533';
        ctx.beginPath(); ctx.moveTo(px+listW+10,hdrBot+5); ctx.lineTo(px+listW+10,py+panelH-55); ctx.stroke();
        const dx=px+listW+25, dw=panelW-listW-45, f=FLAGS[game.flagIdx];
        drawText(f.name, dx, listTop, {size:20, color:C_GREEN, bold:true, glow:6});
        drawText('Difficulty: '+f.diff, dx, listTop+27, {size:13, color:f.diffCol});
        let yy=wrapText('"'+f.desc+'"', dx, listTop+55, dw, 18, {size:12, color:'#88aa88'});
        yy+=12;
        const barW=dw-10;
        [{l:'CARGO VALUE',v:f.multi/3,c:C_GOLD},{l:'THREAT LEVEL',v:f.threat,c:C_RED},{l:'MINE DENSITY',v:f.mines,c:'#ff6633'},{l:'ESCORT ODDS',v:f.escort,c:'#33aaff'}].forEach(st=>{
            drawText(st.l, dx, yy, {size:10, color:'#557755'}); yy+=14;
            ctx.fillStyle='#112211'; ctx.fillRect(dx,yy,barW,8);
            ctx.fillStyle=st.c; ctx.fillRect(dx,yy,barW*clamp(st.v,0,1),8); yy+=16;
        });
    }

    const footTxt = mob ? 'Tap flag \u2192 Tap again to go' : '[W/S] Navigate   [ENTER] Confirm';
    drawText(footTxt, px+panelW/2, py+panelH-pad-10, {size:mob?10:12, align:'center', color:'#336644'});
    drawScanlines();
}
